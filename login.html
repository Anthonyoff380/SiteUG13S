<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | UG13S</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form { background: #111; padding: 30px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; }
        button { background: #ff3e3e; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body style="padding: 50px 10%;">

    <h1>PANEL <span>ADMIN</span></h1>
    <a href="index.html" style="color: grey; text-decoration: none;">← Retour au site</a>

    <!-- CONFIGURATION FOND D'ÉCRAN -->
    <div class="admin-form">
        <h3>Configuration de l'Image de Fond</h3>
        <input type="text" id="bg-url" placeholder="URL de l'image (ex: imgur.com/...)">
        <button id="save-bg">Mettre à jour le fond</button>
    </div>

    <!-- AJOUTER UN MEMBRE -->
    <div class="admin-form">
        <h3>Ajouter un Membre (Équipe)</h3>
        <input type="text" id="member-name" placeholder="Nom & Prénom">
        <input type="text" id="member-role" placeholder="Rôle (ex: Fondateur)">
        <input type="text" id="member-photo" placeholder="URL Photo (Ronde)">
        <textarea id="member-info" placeholder="Petite bio..."></textarea>
        <button id="add-member">Ajouter à l'équipe</button>
    </div>

    <!-- AJOUTER UN MÉTIER -->
    <div class="admin-form">
        <h3>Ajouter un Métier (Job)</h3>
        <input type="text" id="job-title" placeholder="Nom du métier">
        <input type="text" id="job-img" placeholder="URL Image du job">
        <textarea id="job-desc" placeholder="Description du job..."></textarea>
        <button id="add-job">Ajouter le métier</button>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
