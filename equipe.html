<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Équipe UG13S</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,700;1,300&family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bubbles-bg" id="bubblesContainer"></div>
  <div class="overlay-grid"></div>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo"><span class="logo-bracket">[</span>UG13S<span class="logo-bracket\">]</span></a>
      <ul class="nav-links">
        <li><a href="index.html">Accueil</a></li>
        <li><a href="equipe.html" class="active">Équipe</a></li>
      </ul>
    </div>
  </nav>

  <main class="page-container">
    <header class="page-header">
      <h1 class="page-title">NOTRE ÉQUIPE</h1>
      <p class="page-subtitle">Les piliers de la communauté UG13S</p>
    </header>

    <div class="team-grid" id="teamGrid">
      <div class="loading">Chargement des membres...</div>
    </div>
  </main>

  <script src="bubbles.js"></script>
  <script src="main.js"></script>

  <script type="module">
    // CORRECTION : Import direct de firebase-config.js
    import { db } from './firebase-config.js';
    import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function loadTeam() {
      const grid = document.getElementById('teamGrid');
      try {
        const q = query(collection(db, 'members'), orderBy('createdAt', 'asc'));
        const snap = await getDocs(q);
        grid.innerHTML = '';
        if (snap.empty) {
          grid.innerHTML = '<div style="color:white;text-align:center;grid-column:1/-1;">Aucun membre trouvé.</div>';
          return;
        }
        snap.forEach(doc => {
          const m = doc.data();
          const card = document.createElement('div');
          card.className = 'member-card';
          card.innerHTML = `
            <div class="member-avatar-placeholder">👤</div>
            <div class="member-name">${m.prenom || ''} ${m.nom || ''}</div>
            <div class="member-role">${m.role || 'Membre'}</div>
          `;
          grid.appendChild(card);
        });
      } catch(e) {
        console.error(e);
        grid.innerHTML = "Erreur de chargement.";
      }
    }
    loadTeam();
  </script>
</body>
</html>
