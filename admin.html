<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin | UG13S</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 100px 10%;">
    <div class="bg-animations"><div class="blob"></div></div>

    <h1>PANEL <span>ADMINISTRATION</span></h1>
    <p id="user-welcome"></p>

    <!-- SECTION SUPER ADMIN (Visible uniquement par toi) -->
    <div id="super-admin-section" style="display:none; border: 2px solid #ff3e3e; padding: 25px; margin-bottom: 30px; border-radius: 20px; background: rgba(255,0,0,0.05); backdrop-filter: blur(10px);">
        <h3 style="color: #ff3e3e; margin-top: 0;">🛠️ ESPACE PROPRIÉTAIRE</h3>
        <p style="font-size: 0.8rem; margin-bottom: 15px;">Ajouter un nouveau compte administrateur/recruteur :</p>
        <input type="email" id="new-admin-email" placeholder="Email du nouvel admin" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white;">
        <input type="password" id="new-admin-pass" placeholder="Mot de passe" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:white;">
        <button id="create-admin-btn" style="background:#ff3e3e; color:white; border:none; padding:10px 20px; cursor:pointer; font-weight:bold; width:100%; border-radius:8px;">Créer le compte Admin</button>
    </div>

    <!-- GESTION CONTENU -->
    <div class="admin-grid">
        <div class="admin-card" style="background: rgba(20,20,20,0.8); padding: 20px; border-radius: 15px;">
            <h3>Configuration Background</h3>
            <input type="text" id="bg-url" placeholder="URL de l'image de fond">
            <button id="save-bg">Mettre à jour</button>
        </div>

        <div class="admin-card" style="background: rgba(20,20,20,0.8); padding: 20px; border-radius: 15px; margin-top:20px;">
            <h3>Ajouter un Membre</h3>
            <input type="text" id="m-nom" placeholder="Nom Prénom">
            <input type="text" id="m-role" placeholder="Rôle">
            <input type="text" id="m-img" placeholder="URL Photo (ronde)">
            <textarea id="m-info" placeholder="Infos"></textarea>
            <button id="add-member">Ajouter</button>
        </div>
    </div>

    <button id="logout-btn" style="margin-top:50px; background:transparent; color:grey; border:1px solid #333; padding:10px; cursor:pointer;">Se déconnecter</button>

    <script type="module" src="admin.js"></script>
</body>
</html>
